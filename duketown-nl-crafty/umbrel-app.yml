tagline: Minecraft server manager - fixed for UmbrelOS
icon: https://raw.githubusercontent.com/DuketownNL/duketown-umbrel-store/main/duketown-nl-crafty/icon.png
description: >-
  Crafty Controller is a free and open-source Minecraft launcher and manager.
  Manage multiple Minecraft servers from one easy web interface.

  This version is fixed for UmbrelOS by Duketown-NL — uses HTTP on port 8000
  so it works directly from the Umbrel dashboard without SSL issues.

  Default login credentials can be found in:
  data/config/default-creds.txt
